name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}
          ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Update GitOps repo
      env:
        GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
      run: |
        git clone https://$GIT_TOKEN@github.com/erodrich/homelab-gitops.git
        cd homelab-gitops

        sed -i "s|image: .*|image: ${{ secrets.DOCKERHUB_USERNAME }}/demo-app:${{ github.sha }}|" apps/demo-app/deployment.yaml

        git config user.name "github-actions"
        git config user.email "actions@github.com"

        git add .
        git commit -m "Update image to ${{ github.sha }}"
        git push origin main